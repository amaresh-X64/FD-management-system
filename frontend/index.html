<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FD Shield</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; color: #333; padding: 24px; }
    h1 { font-size: 24px; margin-bottom: 4px; color: #1a1a1a; }
    .subtitle { color: #666; margin-bottom: 32px; font-size: 14px; }
    .card { background: white; border-radius: 10px; padding: 24px; margin-bottom: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    h2 { font-size: 16px; margin-bottom: 16px; color: #444; }
    label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; margin-top: 12px; }
    input, select { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    button { margin-top: 16px; padding: 10px 20px; background: #2563eb; color: white; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    pre { background: #f0f4ff; border-radius: 6px; padding: 14px; font-size: 12px; overflow-x: auto; margin-top: 12px; white-space: pre-wrap; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <h1>FD Shield</h1>
  <p class="subtitle">Intelligent FD Portfolio & Liquidity Management</p>

  <div class="grid">
    <div class="card">
      <h2>Create User</h2>
      <label>Name</label><input id="u-name" placeholder="e.g. Arjun Kumar">
      <label>Email</label><input id="u-email" placeholder="arjun@example.com">
      <label>Monthly Income (₹)</label><input id="u-income" type="number" placeholder="80000">
      <label>Monthly Expenses (₹)</label><input id="u-exp" type="number" placeholder="40000">
      <button onclick="createUser()">Create User</button>
      <pre id="user-out">—</pre>
    </div>

    <div class="card">
      <h2>Create Fixed Deposit</h2>
      <label>User ID</label><input id="fd-uid" type="number" placeholder="1">
      <label>Principal (₹)</label><input id="fd-p" type="number" placeholder="200000">
      <label>Interest Rate (%)</label><input id="fd-r" type="number" step="0.1" placeholder="7.5">
      <label>Duration (months)</label><input id="fd-d" type="number" placeholder="24">
      <label>Start Date</label><input id="fd-s" type="date">
      <button onclick="createFd()">Create FD</button>
      <pre id="fd-out">—</pre>
    </div>

    <div class="card">
      <h2>View Portfolio</h2>
      <label>User ID</label><input id="port-uid" type="number" placeholder="1">
      <button onclick="getPortfolio()">Get Portfolio</button>
      <pre id="port-out">—</pre>
    </div>

    <div class="card">
      <h2>Simulate Withdrawal</h2>
      <label>FD ID</label><input id="wd-fdid" type="number" placeholder="1">
      <button onclick="withdraw()" style="background:#dc2626">Withdraw FD</button>
      <pre id="wd-out">—</pre>
    </div>
  </div>

  <script>
    const BASE = "http://localhost:8080";
    const fmt = (data) => JSON.stringify(data, null, 2);

    async function post(url, body) {
      const res = await fetch(BASE + url, { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify(body) });
      return res.json();
    }
    async function get(url) {
      const res = await fetch(BASE + url);
      return res.json();
    }

    async function createUser() {
      const data = await post("/users", {
        name: document.getElementById("u-name").value,
        email: document.getElementById("u-email").value,
        monthlyIncome: +document.getElementById("u-income").value,
        monthlyExpenses: +document.getElementById("u-exp").value
      });
      document.getElementById("user-out").textContent = fmt(data);
      if (data.id) {
        document.getElementById("fd-uid").value = data.id;
        document.getElementById("port-uid").value = data.id;
      }
    }

    async function createFd() {
      const data = await post("/fds", {
        userId: +document.getElementById("fd-uid").value,
        principal: +document.getElementById("fd-p").value,
        interestRate: +document.getElementById("fd-r").value,
        durationMonths: +document.getElementById("fd-d").value,
        startDate: document.getElementById("fd-s").value
      });
      document.getElementById("fd-out").textContent = fmt(data);
      if (data.id) {
        document.getElementById("wd-fdid").value = data.id;
      }
    }

    async function getPortfolio() {
      const uid = document.getElementById("port-uid").value;
      const data = await get("/users/" + uid + "/portfolio");
      document.getElementById("port-out").textContent = fmt(data);
    }

    async function withdraw() {
      const data = await post("/withdraw", { fdId: +document.getElementById("wd-fdid").value });
      document.getElementById("wd-out").textContent = fmt(data);
    }
  </script>
</body>
</html>
